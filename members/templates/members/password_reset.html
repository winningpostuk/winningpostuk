
{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="premium-title mb-4">Reset Your Password</h2>
    <p class="text-light mb-3">Enter your email address below, and we'll send you instructions to reset your password.</p>
    <form method="post" class="text-start">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary mt-3 w-100">Send Reset Link</button>
    </form>
    <p class="mt-3 text-light">
        Remembered your password? 
   <a href="{% url 'login' %}" class="text-warning">Login here</a>
    </p>
</div>
{% endblock %}
