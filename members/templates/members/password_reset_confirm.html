
{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="premium-title mb-4">Set a New Password</h2>
    <p class="text-light mb-3">Please enter your new password below and confirm it.</p>
    <form method="post" class="text-start">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary mt-3 w-100">Update Password</button>
    </form>
    <p class="mt-3 text-light">
   <a href="{% url 'home' %}" class="text-warning">Return to Home Page</a>
    </p>
</div>
{% endblock %}
